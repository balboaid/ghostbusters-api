<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <title>Ghostbusters API - Test UI</title>

  <style>
    body {
      font-family: 'Space Grotesk', sans-serif;
      background: #0c0c0c;
      color: #fff;
      padding: 40px;
      text-align: center;
    }

    h1 {
      color: #00e676;
      margin-bottom: 20px;
    }

    .subtitle {
      color: #888;
      margin-top: -10px;
      margin-bottom: 40px;
      font-size: 18px;
    }

    .result-card {
      margin-top: 30px;
      background: #141414;
      padding: 30px;
      border-radius: 12px;
      max-width: 800px;
      margin-left: auto;
      margin-right: auto;
    }

    .result-title {
      font-size: 24px;
      margin-bottom: 20px;
    }

    .real {
      color: #00e676;
    }

    .ghost {
      color: #ff5252;
    }

    input {
      font-family: 'Space Grotesk', sans-serif;
      width: 70%;
      padding: 12px;
      border-radius: 6px;
      border: none;
      margin-bottom: 20px;
      font-size: 16px;
    }

    button {
      font-family: 'Space Grotesk', sans-serif;
      padding: 12px 24px;
      background: linear-gradient(90deg, #00e676, #015825);
      color: #000;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      font-size: 16px;
    }

    button:hover {
      background: #03c96a;
    }

    pre {
      margin-top: 30px;
      background: #1a1a1a;
      padding: 20px;
      border-radius: 8px;
      text-align: left;
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
</head>
<body>

  <h1>👻 GHOSTBUSTERS API</h1>

  <p class="subtitle">
    Não perca mais seu precioso tempo com vagas de emprego que não existem.
  </p>

  <input id="jobUrl" type="text" placeholder="Cole aqui a URL da vaga (Gupy, Lever, Greenhouse)" />

  <br />

  <button onclick="validateJob()">Bust Ghosts!</button>

  <div id="output" class="result-card">
    Aguardando teste...
  </div>

  <script>
    async function validateJob() {
      const url = document.getElementById("jobUrl").value;
      const output = document.getElementById("output");

      output.innerText = "🕵️‍♂️ Caçando fantasmas...";

      const response = await fetch("http://localhost:3000/validate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url })
      });

      const data = await response.json();

      const statusClass =
        data.status === "real"
          ? "real"
          : "ghost";

      const statusText =
        data.status === "real"
          ? "✅ REAL JOB"
          : "⚠️ GHOST JOB";

      output.innerHTML = `
        <div class="result-title ${statusClass}">
          ${statusText}
        </div>

        <p><strong>Platform:</strong> ${data.platform}</p>

        <p><strong>Status:</strong> ${data.status}</p>

        <p>
          ${
            data.status === "real"
              ? "This vacancy appears to be active."
              : "This vacancy could not be found."
          }
        </p>
      `;
    }
  </script>

</body>
</html>
